<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Hotel Booking</title> 
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
rel="stylesheet"> 
<link rel="stylesheet" type="text/css" href="style.css"> 
</head>
 
<body> 

<!-- NAVBAR --> 
<nav class="navbar navbar-expand-lg navbar-dark bg-dark"> 
  <div class="container-fluid"> 
    <a class="navbar-brand" href="#">RoomBooking</a> 
    <div> 
      <button class="btn btn-primary me-2" onclick="showLogin()">Login</button> 
      <button class="btn btn-success me-2" onclick="showSignup()">Sign Up</button> 
      <button class="btn btn-warning" onclick="showAdminLogin()">Admin</button> 
    </div> 
  </div> 
</nav> 
 
<!-- LOGIN PAGE --> 
<div class="container mt-5 d-none text-center" id="loginPage"> 
  <h2>Login</h2> 
<input type="text" id="loginUser" class="form-control" placeholder="Username"> 
<input type="password" id="loginPass" class="form-control" 
placeholder="Password"> 
<button class="btn btn-success mt-2 me-3" onclick="login()">Login</button> 
<button class="btn btn-secondary mt-2" onclick="showHome()">Back</button> 
<p id="loginMsg" class="mt-2"></p> 
</div> 
<!-- SIGNUP PAGE --> 
<div class="container mt-5 d-none text-center" id="signupPage"> 
<h2>Sign Up</h2> 
<input type="text" id="username" class="form-control" placeholder="Username"> 
<input type="email" id="email" class="form-control" placeholder="Email"> 
<input type="password" id="password" class="form-control" 
placeholder="Password"> 
<button class="btn btn-success mt-2 me-3" onclick="register()">Register</button> 
<button class="btn btn-secondary mt-2" onclick="showHome()">Back</button> 
<p id="registerMsg" class="mt-2"></p> 
</div> 
<!-- ADMIN LOGIN PAGE --> 
<div class="container mt-5 d-none text-center" id="adminLoginPage"> 
<h2>Admin Login</h2> 
<input type="text" id="adminUser" class="form-control" placeholder="Admin 
Username"> 
<input type="password" id="adminPass" class="form-control" placeholder="Admin 
Password"> 
<button class="btn btn-success mt-2 me-3" onclick="adminLogin()">Login</button> 
<button class="btn btn-secondary mt-2" onclick="showHome()">Back</button> 
  <p id="adminMsg"></p> 
</div> 
 
<!-- HOME PAGE --> 
<div class="container mt-5" id="homePage">  
  <div class="row mb-3 align-items-center"> 
 
    <!-- TITLE --> 
    <div class="col-12 col-md-4 mb-2 mb-md-0"> 
      <h2>Available Rooms</h2> 
    </div> 
 
    <!--  SEARCH --> 
    <div class="col-12 col-md-4 mb-2 mb-md-0"> 
      <input type="text" id="searchInput" class="form-control" 
        placeholder="Search Room..." onkeyup="renderRooms()"> 
    </div> 
 
    <!--  FILTER --> 
    <div class="col-12 col-md-4"> 
      <select id="priceFilter" class="form-control" onchange="renderRooms()"> 
        <option value="">All Prices</option> 
        <option value="2000">Below ₹2000</option> 
        <option value="4000">Below ₹4000</option> 
        <option value="6000">Below ₹6000</option> 
      </select> 
    </div> 
 
  </div> 
 
  <!-- ROOMS --> 
  <div class="row" id="roomList"></div> 
 
</div> 
 
<!-- BOOKING PAGE --> 
<div class="container mt-5 d-none text-center" id="bookingPage"> 
  <h2>Book Room</h2> 
  <p id="roomName"></p> 
  <input type="text" id="custName" class="form-control" placeholder="Your Name"> 
  <input type="number" id="age" class="form-control" placeholder="Your Age" 
oninput="getSuggestedRoom()"> 
  <button class="btn btn-primary mt-2 me-3" onclick="confirmBooking()">Confirm 
Booking</button> 
  <button class="btn btn-primary mt-2" onclick="showHome()">Back</button> 
  <p id="bookingMsg" class="mt-2"></p> 
</div> 
 
<!-- ADMIN PANEL --> 
<div class="d-none" id="adminPanel">  
  <div class="row"> 
    <!-- Sidebar --> 
    <div class="col-12 col-md-2 bg-dark text-white" id="adminSidebar"> 
      <h4 class="p-3">Admin Panel</h4> 
      <ul class="nav"> 
        <li class="nav-item"><a href="#" class="nav-link text-white" 
          onclick="showDashboard()">Dashboard</a></li> 
        <li class="nav-item"><a href="#" class="nav-link text-white" 
          onclick="showUsers()">Users</a></li> 
        <li class="nav-item"><a href="#" class="nav-link text-white" 
          onclick="showRooms()">Rooms</a></li> 
        <li class="nav-item"><a href="#" class="nav-link text-white" 
          onclick="showBookings()">Bookings</a></li> 
        <li class="nav-item"><a href="#" class="nav-link text-white" 
          onclick="adminLogout()">Logout</a></li> 
      </ul> 
    </div> 
    <!-- Content --> 
    <div class="col-12 col-md-10" id="adminContent"></div> 
  </div> 
</div> 
 
 <script src="script.js"></script>
</body> 
</html>
